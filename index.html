<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>KYAN CAFE | القائمة</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dff7fb, #52c1d4);
      color: #222;
      text-align: center;
    }

    h1 {
      margin: 25px 0 5px;
      font-size: 28px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    p {
      margin-bottom: 25px;
      color: #444;
    }

    .menu-container {
      width: 92%;
      max-width: 900px;
      margin: 0 auto 35px;
      background: white;
      padding: 15px;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .menu-title {
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 18px;
    }

    .menu-img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
      cursor: pointer;
    }

    .buttons {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    a {
      background: #52c1d4;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      font-size: 15px;
    }

    a {
      background: #ffffff;
      color: #222;
      border: 1px solid #52c1d4;
    }

    footer {
      margin: 30px 0;
      font-size: 14px;
      color: #333;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .modal img {
      max-width: 95%;
      max-height: 90%;
      border-radius: 12px;
    }

    .close {
      position: fixed;
      top: 15px;
      left: 15px;
      background: white;
      color: black;
    }
  </style>
</head>

<body>
  <h1>KYAN CAFE</h1>
  <h2>قائمة KYAN CAFE</h2>
  <p>اضغط على الصورة للتكبير أو لتحميلها مباشرة.</p>

  <div class="menu-container">
    <div class="menu-title">القائمة — الصفحة الأولى</div>

    <img
      src="IMG_5321.png?v=10"
      alt="KYAN CAFE - الصفحة الأولى"
      class="menu-img"
      onclick="openImage('IMG_5321.png?v=10')"
    />

    <div class="buttons">
      <button onclick="openImage('IMG_5321.png?v=10')">تكبير</button>
      <a href="IMG_5321.png?v=10" download>تحميل الصورة</a>
    </div>
  </div>

  <div class="menu-container">
    <div class="menu-title">القائمة — الصفحة الثانية</div>

    <img
      src="IMG_5322.PNG?v=10"
      alt="KYAN CAFE - الصفحة الثانية"
      class="menu-img"
      onclick="openImage('IMG_5322.PNG?v=10')"
    />

    <div class="buttons">
      <button onclick="openImage('IMG_5322.PNG?v=10')">تكبير</button>
      <a href="IMG_5322.PNG?v=10" download>تحميل الصورة</a>
    </div>
  </div>

  <footer>© KYAN CAFE — جميع الحقوق محفوظة</footer>

  <div class="modal" id="imageModal">
    <button class="close" onclick="closeImage()">إغلاق ✕</button>
    <img id="modalImage" src="" alt="عرض الصورة" />
  </div>

  <script>
    function openImage(src) {
      document.getElementById("modalImage").src = src;
      document.getElementById("imageModal").style.display = "flex";
    }

    function closeImage() {
      document.getElementById("imageModal").style.display = "none";
      document.getElementById("modalImage").src = "";
    }
  </script>
</body>
</html>
